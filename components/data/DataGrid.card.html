<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  body { margin:0; background:var(--bg-page); color:var(--text-primary); font-family:var(--font-sans); padding:28px; }
  .lbl { font-size:11px; letter-spacing:0.08em; text-transform:uppercase; color:var(--text-secondary); margin:0 0 12px; }
  .row { display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  .col { display:flex; flex-direction:column; gap:16px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel">
const NS = window.ThalesNextGenPortalDesignSystem_87a801;

const { DataGrid, Badge } = NS;
function Demo(){
 const [sel,setSel]=React.useState(new Set(["m2"]));
 const cat=[{id:"m1",title:"Red Moon in Venus",genre:"Drama",plays:1840,rating:"R"},{id:"m2",title:"Explore England",genre:"Travel",plays:980,rating:"PG"},{id:"m3",title:"Orlando's Best",genre:"Food",plays:2310,rating:"G"}];
 return (
  <DataGrid rowKey="id" selectable selected={sel} onSelectedChange={setSel}
   columns={[{key:"title",header:"Title"},{key:"genre",header:"Genre"},{key:"plays",header:"Plays",align:"end"},{key:"rating",header:"Rating",sortable:false,render:r=><Badge tone="outline">{r.rating}</Badge>}]}
   rows={cat} />
);}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
