<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Flight" description="Live flight status — route hero, metric grid, and a detail row" -->
<helmet>
  <script src="./ds-base.js"></script>
  <style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--bg-page); }
    .theme-toggle {
      position: absolute; top: 16px; right: 20px; z-index: 20;
      display: flex; align-items: center; gap: 8px;
      height: 36px; padding: 0 14px;
      background: var(--surface-input); color: var(--text-primary);
      border: var(--border-width) solid var(--border-hairline);
      border-radius: var(--radius-pill);
      font-family: var(--font-sans); font-size: 12px; font-weight: var(--fw-semibold);
      letter-spacing: .06em; text-transform: uppercase; cursor: pointer;
      transition: background var(--dur-link) var(--ease-smooth), color var(--dur-link) var(--ease-smooth);
    }
    .theme-toggle .glyph { width: 15px; height: 15px; color: var(--accent-active); }
  </style>
</helmet>
<div data-theme="{{ theme }}" style="background: var(--bg-page); min-height: 100vh; color: var(--text-primary); font-family: var(--font-sans); position: relative;">
  <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.NavBar" title="Flight" hint-size="100%,64px"></x-import>

  <button class="theme-toggle" onClick="{{ toggleTheme }}" aria-label="Toggle theme">
    <span class="glyph">{{ themeGlyph }}</span>{{ themeLabel }}
  </button>

  <div style="max-width: 1200px; margin: 0 auto; padding: clamp(20px, 3vw, 32px); display: flex; flex-direction: column; gap: clamp(16px, 2.2vw, 24px);">

    <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.FlightProgress"
      origin="LAX" origin-city="Los Angeles, CA"
      destination="MCO" destination-city="Orlando, FL"
      status="En Route" progress="{{ progress }}" filled="{{ filled }}"
      elapsed="2h 09m elapsed" remaining="1h 19m remaining"
      hint-size="100%,200px"></x-import>

    <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.TileGrid"
      columns="4" tablet="2" phone="2" gap="16" hint-size="100%,140px">
      <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.MetricTile"
        icon="mountain" label="Altitude" value="37,000 ft" hint-size="100%,140px"></x-import>
      <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.MetricTile"
        icon="gauge" label="Ground Speed" value="561 mph" hint-size="100%,140px"></x-import>
      <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.MetricTile"
        icon="navigation" label="Distance Left" value="742 mi" hint-size="100%,140px"></x-import>
      <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.MetricTile"
        icon="clock" label="Arrival (Local)" value="6:42 PM" hint-size="100%,140px"></x-import>
    </x-import>

    <div style="border: var(--border-width) solid var(--border-hairline); border-radius: var(--radius-card); padding: clamp(20px, 3vw, 28px);">
      <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.TileGrid"
        columns="4" tablet="4" phone="2" gap="24" hint-size="100%,52px">
        <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.DetailItem"
          label="Flight" value="SW 1492" hint-size="100%,52px"></x-import>
        <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.DetailItem"
          label="Aircraft" value="Boeing 737-800" hint-size="100%,52px"></x-import>
        <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.DetailItem"
          label="Arrival Gate" value="Terminal B · B14" hint-size="100%,52px"></x-import>
        <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.DetailItem"
          label="Total Distance" value="1,954 mi" align="right" hint-size="100%,52px"></x-import>
      </x-import>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;progress&quot;: { &quot;editor&quot;: &quot;float&quot;, &quot;default&quot;: 0.62, &quot;min&quot;: 0, &quot;max&quot;: 1, &quot;step&quot;: 0.01, &quot;tsType&quot;: &quot;number&quot; },
  &quot;filled&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot; }
}">
class Component extends DCLogic {
  state = { theme: 'dark' };

  renderVals() {
    const theme = this.state.theme;
    const isLight = theme === 'light';
    const h = React.createElement;
    const sun = h('svg', { viewBox: '0 0 24 24', width: 15, height: 15, fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round' },
      h('circle', { cx: 12, cy: 12, r: 4 }),
      h('path', { d: 'M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4' }));
    const moon = h('svg', { viewBox: '0 0 24 24', width: 15, height: 15, fill: 'none', stroke: 'currentColor', strokeWidth: 2, strokeLinecap: 'round', strokeLinejoin: 'round' },
      h('path', { d: 'M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z' }));
    return {
      progress: this.props.progress ?? 0.62,
      filled: this.props.filled ?? false,
      theme,
      themeLabel: isLight ? 'Light' : 'Dark',
      themeGlyph: isLight ? sun : moon,
      toggleTheme: () => this.setState(s => ({ theme: s.theme === 'light' ? 'dark' : 'light' })),
    };
  }
}
</script>
</body>
</html>
