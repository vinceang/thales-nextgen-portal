<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Browse" description="Entertainment catalogue — view tabs, a featured hero, a filter rail, and a responsive media grid." -->
<helmet data-dc-atomics>
  <script src="./ds-base.js"></script>
  <style>
    html,body{margin:0;padding:0}
    body{background:var(--bg-page)}
    .browse{min-height:100vh;background:var(--bg-page);color:var(--text-primary);font-family:var(--font-sans);position:relative}
    .wrap{max-width:1280px;margin:0 auto;padding:clamp(20px,3vw,32px);display:flex;flex-direction:column;gap:clamp(18px,2.4vw,28px)}
    .tabsrow{border-block-end:var(--border-width) solid var(--border-hairline)}
    .split{display:flex;gap:clamp(20px,2.6vw,32px);align-items:flex-start}
    .aside{flex:0 0 244px;position:sticky;top:24px}
    .grid-head{display:flex;align-items:baseline;justify-content:space-between;gap:16px;margin-bottom:18px}
    .grid-title{font-family:var(--font-tile);font-size:22px;margin:0}
    .grid-count{color:var(--text-secondary);font-size:13px}
    .colmain{flex:1;min-width:0}
    .pillwrap{display:flex;flex-wrap:wrap;gap:8px}
    .theme-toggle{position:absolute;top:16px;right:20px;z-index:40;display:flex;align-items:center;gap:8px;height:36px;padding:0 14px;background:var(--surface-input);color:var(--text-primary);border:var(--border-width) solid var(--border-hairline);border-radius:var(--radius-pill);font-family:var(--font-sans);font-size:12px;font-weight:var(--fw-semibold);letter-spacing:.06em;text-transform:uppercase;cursor:pointer}
    .theme-toggle .glyph{width:15px;height:15px;color:var(--accent-active)}
    @media (max-width:820px){.aside{display:none}}
  </style>
</helmet>
<div class="browse" data-theme="{{ theme }}" data-screen-label="Browse">
  <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.NavBar" title="Entertainment" wifi-active="{{ true }}" hint-size="100%,64px"></x-import>
  <button class="theme-toggle" onClick="{{ toggleTheme }}" aria-label="Toggle theme"><span class="glyph">{{ themeGlyph }}</span>{{ themeLabel }}</button>

  <div class="wrap">
    <div class="tabsrow">
      <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.Tabs" tabs="{{ tabs }}" value="{{ tab }}" on-change="{{ setTab }}" hint-size="100%,48px"></x-import>
    </div>

    <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.HeroBanner"
      image="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1400&q=80"
      kicker="Featured Tonight" title="Blockbusters at 37,000 Feet" cta-label="Start Watching" height="{{ 300 }}" hint-size="100%,300px"></x-import>

    <div class="split">
      <aside class="aside">
        <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.FilterPanel" title="Filters" active-count="{{ 2 }}" on-clear="{{ clearFilters }}" hint-size="100%,360px">
          <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.FilterSection" label="Genre" hint-size="100%,120px">
            <div class="pillwrap">
              <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.GenrePill" active="{{ gAction }}" onClick="{{ toggleAction }}" hint-size="80px,32px">Action</x-import>
              <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.GenrePill" active="{{ gComedy }}" onClick="{{ toggleComedy }}" hint-size="80px,32px">Comedy</x-import>
              <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.GenrePill" active="{{ gDrama }}" onClick="{{ toggleDrama }}" hint-size="80px,32px">Drama</x-import>
              <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.GenrePill" active="{{ gKids }}" onClick="{{ toggleKids }}" hint-size="80px,32px">Family</x-import>
            </div>
          </x-import>
          <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.FilterSection" label="Rating" hint-size="100%,120px">
            <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.Checkbox" checked="{{ true }}" hint-size="100%,28px">G &amp; PG</x-import>
            <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.Checkbox" hint-size="100%,28px">PG-13</x-import>
            <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.Checkbox" hint-size="100%,28px">R</x-import>
          </x-import>
        </x-import>
      </aside>

      <div class="colmain">
        <div class="grid-head">
          <h2 class="grid-title">{{ gridTitle }}</h2>
          <span class="grid-count">128 titles</span>
        </div>
        <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.TileGrid" columns="3" tablet="2" phone="1" gap="16" hint-size="100%,520px">
          <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.ShowcaseTile" image="https://images.unsplash.com/photo-1542204165-65bf26472b9b?w=900&q=80" kicker="Watch" title="Skyline Heist" font="tile" height="{{ 240 }}" hint-size="100%,240px"></x-import>
          <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.ShowcaseTile" image="https://images.unsplash.com/photo-1574267432553-4b4628081c31?w=900&q=80" kicker="Watch" title="The Long Way Home" font="tile" height="{{ 240 }}" hint-size="100%,240px"></x-import>
          <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.ShowcaseTile" image="https://images.unsplash.com/photo-1593784991095-a205069470b6?w=900&q=80" kicker="Watch" title="Midnight Signal" font="tile" height="{{ 240 }}" hint-size="100%,240px"></x-import>
          <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.ShowcaseTile" image="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=900&q=80" kicker="Watch" title="Reel Stories" font="tile" height="{{ 240 }}" hint-size="100%,240px"></x-import>
          <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.ShowcaseTile" image="https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=900&q=80" kicker="Watch" title="Coastlines" font="tile" height="{{ 240 }}" hint-size="100%,240px"></x-import>
          <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.ShowcaseTile" image="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=900&q=80" kicker="Watch" title="Afterglow" font="tile" height="{{ 240 }}" hint-size="100%,240px"></x-import>
        </x-import>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = { theme: 'dark', tab: 'movies', genres: { action: true, drama: true } };
  renderVals() {
    const isLight = this.state.theme === 'light';
    const h = React.createElement;
    const sun = h('svg',{viewBox:'0 0 24 24',width:15,height:15,fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round'},h('circle',{cx:12,cy:12,r:4}),h('path',{d:'M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4'}));
    const moon = h('svg',{viewBox:'0 0 24 24',width:15,height:15,fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},h('path',{d:'M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z'}));
    const g = this.state.genres;
    const tg = (k) => () => this.setState(s => ({ genres: { ...s.genres, [k]: !s.genres[k] } }));
    const titles = { movies: 'Popular Movies', tv: 'Trending Series', music: 'Top Albums', podcasts: 'Featured Podcasts' };
    return {
      theme: this.state.theme,
      themeLabel: isLight ? 'Light' : 'Dark',
      themeGlyph: isLight ? sun : moon,
      toggleTheme: () => this.setState(s => ({ theme: s.theme === 'light' ? 'dark' : 'light' })),
      tabs: [ {value:'movies',label:'Movies'}, {value:'tv',label:'TV'}, {value:'music',label:'Music'}, {value:'podcasts',label:'Podcasts'} ],
      tab: this.state.tab,
      setTab: (v) => this.setState({ tab: v }),
      gridTitle: titles[this.state.tab] || 'Browse',
      gAction: !!g.action, gComedy: !!g.comedy, gDrama: !!g.drama, gKids: !!g.kids,
      toggleAction: tg('action'), toggleComedy: tg('comedy'), toggleDrama: tg('drama'), toggleKids: tg('kids'),
      clearFilters: () => this.setState({ genres: {} }),
    };
  }
}
</script>
</body>
</html>
