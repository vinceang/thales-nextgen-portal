<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Detail" description="Single-title detail page — backdrop, poster, synopsis, metadata grid, and a related row." -->
<helmet data-dc-atomics>
  <script src="./ds-base.js"></script>
  <style>
    html,body{margin:0;padding:0}
    body{background:var(--bg-page)}
    .detail{min-height:100vh;background:var(--bg-page);color:var(--text-primary);font-family:var(--font-sans);position:relative}
    .topbar{max-width:1120px;margin:0 auto;padding:18px clamp(20px,3vw,32px) 8px}
    .backdrop{position:relative;height:clamp(220px,30vw,340px);overflow:hidden}
    .backdrop img{width:100%;height:100%;object-fit:cover;display:block}
    .backdrop::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(8,10,12,.10) 0%,rgba(8,10,12,.50) 62%,var(--bg-page) 100%)}
    .wrap{max-width:1120px;margin:0 auto;padding:clamp(18px,2.4vw,24px) clamp(20px,3vw,32px) clamp(32px,4vw,56px)}
    .hero-row{position:relative;z-index:2;display:flex;gap:clamp(20px,3vw,36px);align-items:flex-start}
    .poster{flex:0 0 clamp(150px,18vw,220px);margin-top:clamp(-150px,-12vw,-100px)}
    .poster img{width:100%;aspect-ratio:2/3;object-fit:cover;border-radius:var(--radius-card);border:var(--border-width) solid var(--border-hairline);display:block}
    .info{flex:1;min-width:0;padding-bottom:6px}
    .meta-tags{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:14px}
    .title{font-family:var(--font-display);font-weight:700;font-size:clamp(30px,4.4vw,52px);line-height:1.02;letter-spacing:-.02em;margin:0 0 10px}
    .subline{color:var(--text-secondary);font-size:14px;margin:0 0 18px}
    .synopsis{font-size:16px;line-height:1.65;max-width:60ch;color:var(--on-surface-2);margin:0 0 24px}
    .actions{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:28px}
    .specs{border-block-start:var(--border-width) solid var(--border-hairline);padding-top:24px}
    .section{margin-top:clamp(32px,4vw,52px)}
    .section-head{font-family:var(--font-tile);font-size:22px;margin:0 0 18px}
    .theme-toggle{position:absolute;top:16px;right:20px;z-index:40;display:flex;align-items:center;gap:8px;height:36px;padding:0 14px;background:rgba(20,24,28,.7);color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:var(--radius-pill);font-family:var(--font-sans);font-size:12px;font-weight:var(--fw-semibold);letter-spacing:.06em;text-transform:uppercase;cursor:pointer;backdrop-filter:blur(6px)}
    .theme-toggle .glyph{width:15px;height:15px;color:var(--color-bright-blue)}
    @media (max-width:680px){.hero-row{flex-direction:column;align-items:stretch;margin-top:-72px}.poster{flex:0 0 auto;max-width:160px}}
  </style>
</helmet>
<div class="detail" data-theme="{{ theme }}" data-screen-label="Detail">
  <button class="theme-toggle" onClick="{{ toggleTheme }}" aria-label="Toggle theme"><span class="glyph">{{ themeGlyph }}</span>{{ themeLabel }}</button>

  <div class="topbar">
    <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.Breadcrumbs" items="{{ crumbs }}" hint-size="100%,24px"></x-import>
  </div>

  <div class="backdrop">
    <img src="https://images.unsplash.com/photo-1542204165-65bf26472b9b?w=1600&q=80" alt="Backdrop"/>
  </div>

  <div class="wrap">
    <div class="hero-row">
      <div class="poster">
        <img src="https://images.unsplash.com/photo-1574267432553-4b4628081c31?w=600&q=80" alt="Poster"/>
      </div>
      <div class="info">
        <div class="meta-tags">
          <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.Badge" tone="accent" hint-size="56px,24px">PG-13</x-import>
          <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.Badge" tone="outline" hint-size="48px,24px">2024</x-import>
          <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.Badge" tone="outline" hint-size="48px,24px">2h 08m</x-import>
        </div>
        <h1 class="title">Skyline Heist</h1>
        <p class="subline">Action · Thriller — directed by Mara Vance</p>
        <p class="synopsis">A disgraced pilot is pulled into one last job: lifting a fortune from a private jet mid-flight. Forty thousand feet up, with a storm closing in, every second of the descent counts.</p>
        <div class="actions">
          <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.Button" variant="primary" size="lg" hint-size="140px,48px">Play Now</x-import>
          <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.Button" variant="secondary" size="lg" hint-size="150px,48px">Add to My List</x-import>
        </div>
        <div class="specs">
          <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.TileGrid" columns="4" tablet="4" phone="2" gap="24" hint-size="100%,52px">
            <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.DetailItem" label="Director" value="Mara Vance" hint-size="100%,52px"></x-import>
            <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.DetailItem" label="Studio" value="Meridian Films" hint-size="100%,52px"></x-import>
            <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.DetailItem" label="Language" value="EN · 6 subtitles" hint-size="100%,52px"></x-import>
            <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.DetailItem" label="Audio" value="Dolby 5.1" hint-size="100%,52px"></x-import>
          </x-import>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 class="section-head">More Like This</h2>
      <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.TileGrid" columns="4" tablet="2" phone="2" gap="16" hint-size="100%,200px">
        <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.ShowcaseTile" image="https://images.unsplash.com/photo-1593784991095-a205069470b6?w=700&q=80" kicker="Watch" title="Midnight Signal" height="{{ 200 }}" hint-size="100%,200px"></x-import>
        <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.ShowcaseTile" image="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=700&q=80" kicker="Watch" title="Reel Stories" height="{{ 200 }}" hint-size="100%,200px"></x-import>
        <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.ShowcaseTile" image="https://images.unsplash.com/photo-1574375927938-d5a98e8ffe85?w=700&q=80" kicker="Watch" title="Coastlines" height="{{ 200 }}" hint-size="100%,200px"></x-import>
        <x-import component-from-global-scope="ThalesNextGenPortalDesignSystem_87a801.ShowcaseTile" image="https://images.unsplash.com/photo-1517604931442-7e0c8ed2963c?w=700&q=80" kicker="Watch" title="Afterglow" height="{{ 200 }}" hint-size="100%,200px"></x-import>
      </x-import>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{}">
class Component extends DCLogic {
  state = { theme: 'dark' };
  renderVals() {
    const isLight = this.state.theme === 'light';
    const h = React.createElement;
    const sun = h('svg',{viewBox:'0 0 24 24',width:15,height:15,fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round'},h('circle',{cx:12,cy:12,r:4}),h('path',{d:'M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4'}));
    const moon = h('svg',{viewBox:'0 0 24 24',width:15,height:15,fill:'none',stroke:'currentColor',strokeWidth:2,strokeLinecap:'round',strokeLinejoin:'round'},h('path',{d:'M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z'}));
    return {
      theme: this.state.theme,
      themeLabel: isLight ? 'Light' : 'Dark',
      themeGlyph: isLight ? sun : moon,
      toggleTheme: () => this.setState(s => ({ theme: s.theme === 'light' ? 'dark' : 'light' })),
      crumbs: [ {label:'Entertainment',href:'#'}, {label:'Movies',href:'#'}, {label:'Skyline Heist'} ],
    };
  }
}
</script>
</body>
</html>
