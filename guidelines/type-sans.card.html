<!-- @dsCard group="Type" viewport="700x230" name="Sans — Montserrat UI & body" subtitle="H2/H3, body, labels, uppercase buttons" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg-page); padding: 24px;
         color: var(--text-primary); font-family: var(--font-sans); }
  .h2 { font-weight: 700; font-size: 26px; margin: 0 0 10px; }
  .h3 { font-weight: 700; font-size: 18px; margin: 0 0 10px; }
  .body { font-weight: 400; font-size: 16px; line-height: 1.6;
          color: rgba(255,255,255,0.82); max-width: 560px; margin: 0 0 14px; }
  .btn { display: inline-block; font-weight: 700; font-size: 14px;
         letter-spacing: 0.04em; text-transform: uppercase; color: #fff;
         background: var(--accent); padding: 8px 18px; }
</style>
</head>
<body>
  <div class="h2">Heading Two — Montserrat 700</div>
  <div class="h3">Heading Three / kicker</div>
  <p class="body">Body copy is set in Montserrat with airy line spacing. The sans
    carries every functional role — labels, navigation, controls — while serifs
    stay reserved for editorial headlines.</p>
  <span class="btn">View Plans</span>
</body>
</html>
